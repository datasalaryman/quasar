[package]
name = "quasar-idl-gen"
description = "IDL descriptor IR, resolution pipeline, and codegen model for Quasar"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[lib]
name = "quasar_idl_gen"
path = "src/lib.rs"

[dependencies]
quasar-idl-schema = { path = "../schema" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
